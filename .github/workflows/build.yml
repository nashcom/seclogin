name: Build and Test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      quick:
        description: 'Skip delay-heavy tests (faster run)'
        type: boolean
        default: false

jobs:
  # ---------------------------------------------------------------------------
  # Build and test — runs entirely inside Alpine for a faithful static build
  # Same deps as Dockerfile.build; no Docker-in-Docker needed in CI
  # ---------------------------------------------------------------------------
  build-test:
    name: Build and test (Alpine static)
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
      # SETUID/SETGID caps required — test suite installs a SUID binary
      # and runs sshd for loopback auth tests
      options: --cap-add SETUID --cap-add SETGID

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build and test dependencies
        run: |
          apk add --no-cache \
            gcc musl-dev make \
            openssl-dev openssl-libs-static \
            zlib-static \
            openssh oath-toolkit-oathtool \
            expect bash dos2unix

      - name: Build static binary
        run: |
          # strip leading 'v' from tag (v1.0.0 → 1.0.0); fall back to git describe
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
          echo "Building version: $VERSION"
          make -f Makefile.alpine clean all VERSION="$VERSION"

      - name: Binary info
        run: |
          file seclogin
          ls -lh seclogin
          strings seclogin | grep "etc/seclogin" | sort -u

      - name: Run test suite
        run: |
          QUICK_FLAG=""
          [ "${{ inputs.quick }}" = "true" ] && QUICK_FLAG="--quick"
          ROOT_DIR=$(pwd) bash <(dos2unix < testing/test_seclogin.sh) $QUICK_FLAG

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: seclogin-linux-x86_64-static
          path: seclogin
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Release — triggered on version tags (v1.0.0, v1.2.3, etc.)
  # Downloads the artifact from the build job and attaches it to the release
  # ---------------------------------------------------------------------------
  release:
    name: Publish release
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: seclogin-linux-x86_64-static

      - name: Show artifact
        run: ls -lh seclogin

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: seclogin
          generate_release_notes: true
          body: |
            ## seclogin — Secure Enforced Login

            Statically linked binary built on Alpine Linux (musl libc).
            No runtime dependencies — deploy anywhere.

            ### Installation
            ```bash
            # Client / target server (SUID root)
            sudo install -o root -g seclogin -m 4750 seclogin /usr/local/bin/seclogin

            # Auth server (no SUID)
            sudo install -o root -g seclogin -m 0750 seclogin /usr/local/bin/seclogin

            # Gate mode (SUID+SGID to seclogin user)
            sudo install -o seclogin -g seclogin -m 6755 seclogin /usr/local/bin/seclogin-gate
            ```

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full setup instructions.
